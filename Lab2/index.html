<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Controller Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'brand-violet': '#7C3AED',
                        'brand-zinc': '#52525B',
                        'brand-frame': '#F4F4F5',
                        'brand-white': '#FFFFFF',
                        'brand-dark': '#18181B'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-frame text-brand-zinc font-sans antialiased h-screen flex overflow-hidden">

    <aside class="w-64 bg-brand-zinc text-brand-white hidden md:flex flex-col h-full shrink-0 shadow-lg z-10">
        <div class="p-6 flex items-center gap-3">
            <svg class="w-7 h-7 text-brand-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <span class="text-xl font-bold tracking-wide">CNC Controller</span>
        </div>
        <nav class="flex-1 px-4 py-2 space-y-2">
            <a href="#" class="flex items-center gap-3 bg-white/10 text-brand-white p-3 rounded-lg font-bold">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>Головна</span>
            </a>
            <a href="#" class="flex items-center gap-3 text-gray-300 hover:text-brand-white hover:bg-white/5 p-3 rounded-lg transition-all duration-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="font-medium">Налаштування</span>
            </a>
            <a href="#" class="flex items-center gap-3 text-gray-300 hover:text-brand-white hover:bg-white/5 p-3 rounded-lg transition-all duration-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                <span class="font-medium">Вихід</span>
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-y-auto">
        <header class="md:hidden flex items-center justify-between p-4 bg-brand-violet text-brand-white shrink-0 shadow-md">
            <button class="text-gray-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <span class="text-xl font-bold tracking-wide">Верстат CNC-01</span>
            <div class="w-6"></div>
        </header>

        <div class="flex flex-1 w-full relative">
            <main class="flex-1 p-6 md:p-10 w-full flex flex-col">
                <div class="hidden md:flex items-center justify-between mb-10 w-full">
                    <div class="flex-1"></div>
                    <h1 class="text-2xl md:text-3xl font-bold text-brand-violet border-2 border-brand-zinc bg-brand-white px-8 py-2 rounded-xl text-center shadow-sm whitespace-nowrap">
                        Верстат CNC-01
                    </h1>
                    <div class="flex-1 flex justify-end translate-x-28">
                        <a href="index-dark.html" class="flex items-center gap-2 text-brand-violet hover:bg-brand-violet/10 px-4 py-2 rounded-lg transition-all duration-300">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                            <span class="font-medium">Mode</span>
                        </a>
                    </div>
                </div>
                
                <section class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                    <article class="bg-brand-white border-2 border-brand-zinc rounded-xl p-6 shadow-sm hover:shadow-md hover:border-brand-violet transition-all duration-300">
                        <h3 class="text-sm text-brand-zinc mb-2 font-medium">Швидкість шпинделя</h3>
                        <p class="text-2xl font-bold text-brand-zinc">12000 об/хв</p>
                    </article>
                    <a href="details.html" class="block bg-brand-white border-2 border-brand-zinc rounded-xl p-6 shadow-sm hover:border-brand-violet hover:shadow-md transition-all duration-300">
                        <h3 class="text-sm text-brand-zinc mb-2 font-medium">Хід виконання</h3>
                        <p class="text-2xl font-bold text-brand-zinc">78%</p>
                    </a>
                    <article class="bg-brand-white border-2 border-brand-zinc rounded-xl p-6 shadow-sm hover:shadow-md hover:border-brand-violet transition-all duration-300">
                        <h3 class="text-sm text-brand-zinc mb-2 font-medium">Час роботи</h3>
                        <p class="text-2xl font-bold text-brand-zinc">04:12:30</p>
                    </article>
                    <article class="bg-brand-white border-2 border-brand-zinc rounded-xl p-6 shadow-sm hover:shadow-md hover:border-brand-violet transition-all duration-300">
                        <h3 class="text-sm text-brand-zinc mb-2 font-medium">Статус інструменту</h3>
                        <p class="text-2xl font-bold text-brand-zinc">В роботі</p>
                    </article>
                </section>

                <section class="bg-brand-zinc p-8 md:p-12 rounded-2xl flex flex-col items-center shadow-lg mb-10">
                    <img src="graph.svg" alt="Візуалізація G-коду" class="w-full max-w-4xl h-auto object-contain mb-6">
                    <h2 class="text-brand-white font-bold text-xl tracking-wide">Візуалізація G-коду</h2>
                </section>

                <div class="md:hidden mt-auto pt-8 flex justify-center">
                    <a href="index-dark.html" class="flex items-center gap-2 bg-brand-white text-brand-violet px-6 py-3 rounded-full transition-all duration-300 hover:opacity-90 active:scale-95 shadow-md font-medium">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <span>Mode</span>
                    </a>
                </div>

            </main>
            <div class="w-64 bg-transparent hidden md:flex flex-col shrink-0 p-6 md:p-10 items-end"></div>
        </div> 
    </div> 
</body>
</html>
